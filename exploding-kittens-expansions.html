<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <title>Exploding Kittens | Setup & Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f8f8f8;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 1rem;
        }

        .expansion {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 2rem;
        }

        .expansion:last-child {
            border-bottom: none;
        }

        .expansion-title {
            font-size: 1.6em;
            /* Un poco más grande para destacar */
            font-weight: 700;
            margin-bottom: 0.3em;
            color: #2c3e50;
            /* Color oscuro */
        }

        .pack-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 1.5em;
            /* Más margen para separar packs */
            color: #3498db;
            /* Color de acento */
        }

        .expansion-desc {
            color: #555;
            margin-bottom: 1em;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 0.7rem;
            margin-top: 1em;
        }

        /* NEW STYLES for the content inside the card icon (Generated by JS) */
        .card-icon img {
            width: 38px;
            height: 38px;
            object-fit: contain;
            margin-bottom: 0.3em;
        }

        .card-icon .card-name {
            font-size: 0.85em;
            color: #333;
            margin-bottom: 0.15em;
            /* Forzamos la truncación si el texto no cabe en el contenedor pequeño (80px) */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .card-icon .card-count {
            font-size: 0.82em;
            color: #888;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="header-container"></div>
    <div class="container">
        <div id="expansions-list"></div>
    </div>
    <div id="footer-container"></div>
    <script src="js/include.js"></script>
    <script src="js/exploding-kittens-functions.js"></script>
    <script src="js/exploding-kittens-expansions.js"></script>
</body>

</html>
