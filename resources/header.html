<style>
    /* 1. DEFINICIÓN DE VARIABLES DE COLOR */
    :root {
        --color-acento: #bb181d;
        /* Color Primario: Verde Esmeralda */
        --color-fondo: #f8f8f8;
        /* Color de Fondo: Gris Casi Negro */
        --color-tarjeta: #1F2937;
        /* Color de Contenedor: Gris Oscuro */

        --color-texto: #1F2937;
        --color-texto-tarjeta: #9CA3AF;
        --color-borde-tarjeta: #374151;
    }

    /* 2. APLICACIÓN DE VARIABLES A LOS ESTILOS GLOBALMENTE */
    body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        background-color: var(--color-fondo);
        /* Usando variable */
        color: var(--color-texto);
        /* Usando variable */
    }

    /* Para usar una fuente del agente en títulos específicos */
    .font-code {
        font-family: 'Space Mono', ui-monospace, SFMono-Regular, monospace;
    }

    .font-setup-and-play {
        font-family: 'Bangers', system-ui;
    }

    /* Sobrescribir las clases de Tailwind con las variables (para el color de acento) */
    .text-acento {
        color: var(--color-acento);
    }

    .hover-acento:hover {
        color: var(--color-acento);
    }

    .bg-tarjeta {
        background-color: var(--color-tarjeta);
    }

    .border-tarjeta {
        border-color: var(--color-borde-tarjeta);
    }

    .border-tarjeta:hover {
        border-color: var(--color-acento);
    }

    /* Ajuste específico para el texto gris de las tarjetas */
    .text-tarjeta {
        color: var(--color-texto-tarjeta);
    }

    nav a {
        color: #fff;
        text-decoration: none;
        font-size: 1.1rem;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        transition: background 0.2s;
    }

    nav a:hover {
        color: var(--color-acento);
    }

    .exploding-kittens {
        color: #fff;
    }

    .agente-33 {
        color: #eab308;
        font-family: 'Orbitron', sans-serif;
    }

    .el-impostor {
        color: #FF3B30;
        font-family: 'Metal Mania', system-ui;
    }

    .tres-pistas {
        color: #1ec8c5;
        font-family: 'Luckiest Guy', cursive;
    }

    .prisma {
        font-family: 'Bungee Shade', sans-serif;
        text-transform: uppercase;
        /* Aplicación del Gradiente */
        background: linear-gradient(45deg,
                #2dffeb 20%,
                #8f54b3 40%,
                #fcba49 60%,
                #2c75e3 90%);

        /* Truco para que el fondo solo pinte el texto */
        -webkit-background-clip: text;
        background-clip: text;

        /* Hacemos transparente el color original de la fuente para ver el gradiente */
        color: transparent;

        filter: drop-shadow(0 0 8px rgba(30, 200, 197, 0.3));
        line-height: 1.2;
        display: inline-block;
        /* Asegura que el gradiente se calcule bien */
    }

    .loot-and-run {
        font-family: 'Ruslan Display', cursive;
        /* Degradado de esmeralda con facetas */
        background: linear-gradient(135deg,
                #a7f3d0 0%,
                /* Reflejo de luz en el borde */
                #10b981 25%,
                /* Verde esmeralda base */
                #065f46 50%,
                /* Sombra interna profunda */
                #10b981 75%,
                /* Reflejo secundario */
                #047857 100%);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;

        /* El truco: Múltiples sombras para dar volumen de piedra */
        filter: drop-shadow(2px 2px 0px rgba(0, 0, 0, 0.2));
        text-shadow:
            0px 2px 4px rgba(0, 0, 0, 0.5),
            0px 0px 20px rgba(16, 185, 129, 0.4);
        background-size: 200% auto;
        animation: shine 5s linear infinite;
    }

    /*Function for the text of Loot & Run to shine*/
    @keyframes shine {
        to {
            background-position: 200% center;
        }
    }
</style>
